document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

cle','FAQ','','external-link')}\n    <\u002Fnav>\n    <div class=\"spacer\"><\u002Fdiv>\n    <div class=\"foot\">\n      <a><span class=\"acc\">${ICON('layout-dashboard')}<\u002Fspan> Открыть приложение<\u002Fa>\n      <a><span class=\"acc\">${ICON('shield')}<\u002Fspan> Перейти в админку<\u002Fa>\n      <a class=\"danger\">${ICON('log-out')} Выйти<\u002Fa>\n    <\u002Fdiv>\n  <\u002Faside>`;\n}\n\n/* ---------- EDIT PAGE ---------- */\nfunction stepper(){\n  const steps=[\n    {st:'Шаг 1 из 3',nm:'Дизайн',ic:'palette',state:'done'},\n    {st:'Шаг 2 из 3',nm:'Приложение',ic:'smartphone',state:'now'},\n    {st:'Шаг 3 из 3',nm:'Трафик',ic:'trending-up',state:''},\n  ];\n  return '<div class=\"stepper\">'+steps.map(s=>\n    `<div class=\"step ${s.state}\"><div class=\"ic\">${ICON(s.ic)}<\u002Fdiv><div><div class=\"st\">${s.st}<\u002Fdiv><div class=\"nm\">${s.nm}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`\n  ).join('')+'<\u002Fdiv>';\n}\nconst LANGS=['Russian','Japanese','German','French','Chinese','Albanian','Arabic','Catalan','Portuguese','Spanish'];\nfunction langTabs(){\n  return `<div class=\"langs\"><span class=\"info\">${ICON('info')}<\u002Fspan>\n    <button class=\"lang on\">Язык по умолчанию (English)<\u002Fbutton>\n    ${LANGS.map(l=>`<button class=\"lang\">${l}<\u002Fbutton>`).join('')}\n    <button class=\"lang add\">${ICON('plus')}<\u002Fbutton><\u002Fdiv>`;\n}\nconst DESC=`🎣 ❄️ Ice Fishing – Drop the Line and Reel in Big Wins! 💎\nStep onto the frozen lake and feel the chill of anticipation in Ice Fishing! Drill through the ice, cast your line, and wait for the perfect bite. Every catch can turn into a rewarding surprise — will luck be on your side today?\n\n⚡ Smooth, relaxing gameplay with exciting win moments\n🎯 Simple mechanics that keep you focused and engaged\n🎁 Get your bonuses, free rounds, and special rewards!\n💰 Watch your catches turn into real profits`;\nconst fld=(c,v)=>`<label class=\"fld\"><span class=\"cap\">${c}<\u002Fspan><input value=\"${v}\"><\u002Flabel>`;\nconst cap=c=>`<span class=\"cap\">${c}<\u002Fspan>`;\n\nfunction formCard(){\n  return `<div class=\"card\">\n    <div class=\"card-h\"><div class=\"t\"><span class=\"dot\"><\u002Fspan>Основное<\u002Fdiv><button class=\"btn btn-acc\">Сохранить<\u002Fbutton><\u002Fdiv>\n    <div class=\"grid3\">${fld('Название в CRM','Ice Fishing Copy')}${fld('Название для пользователя','Ice Fishing')}${fld('Автор','Evolution')}<\u002Fdiv>\n    <label class=\"fld full\"><span class=\"cap\">Описание<\u002Fspan><textarea rows=\"9\">${DESC}<\u002Ftextarea><\u002Flabel>\n  <\u002Fdiv>`;\n}\nfunction commentsCard(){\n  const ph=`<div class=\"ph\"><\u002Fdiv>`;\n  return `<div class=\"card\">\n    <div class=\"card-h\"><div class=\"t\"><span class=\"dot\"><\u002Fspan>Комментарии<\u002Fdiv><\u002Fdiv>\n    <div class=\"comment\" style=\"margin-bottom:14px\">\n      <div class=\"cmt-head\"><div class=\"lbl\">Комментарий<\u002Fdiv><span class=\"x\">${ICON('x')}<\u002Fspan><\u002Fdiv>\n      <div class=\"cmt-cols\">\n        <div>\n          <div class=\"author\">${ph}<label class=\"fld\">${cap('Автор комментария')}<input value=\"james_gamer\"><\u002Flabel><\u002Fdiv>\n          <div class=\"grid2\">\n            <div class=\"numfld\">${cap('Рейтинг')}<div class=\"numbox\"><button>−<\u002Fbutton><div class=\"val\">5<\u002Fdiv><button>+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <div class=\"numfld\">${cap('Количество лайков')}<div class=\"numbox\"><button>−<\u002Fbutton><div class=\"val\">40<\u002Fdiv><button>+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <label class=\"fld row stack\">${cap('Дата комментария')}<span class=\"pre\">${ICON('calendar')}<\u002Fspan><input value=\"6.16.2026\"><\u002Flabel>\n          <label class=\"fld stack\">${cap('Текст комментария')}<textarea rows=\"3\">Loved the insane odds and lightning fast payouts, plus the new slick mobile app that makes playing a breeze!<\u002Ftextarea><\u002Flabel>\n        <\u002Fdiv>\n        <div>\n          <label class=\"fld\">${cap('Автор ответа')}<input value=\"Evolution\"><\u002Flabel>\n          <label class=\"fld row stack\">${cap('Дата ответа')}<span class=\"pre\">${ICON('calendar')}<\u002Fspan><input value=\"6.16.2026\"><\u002Flabel>\n          <label class=\"fld stack\">${cap('Текст комментария')}<textarea rows=\"3\">Thank you for sharing your experience and congratulations on your win. We appreciate your recommendation.<\u002Ftextarea><\u002Flabel>\n          <div class=\"cmt-actions\" style=\"justify-content:flex-end\"><button class=\"del\">${ICON('trash-2')} Удалить ответ<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"comment\">\n      <div class=\"cmt-head\"><div class=\"lbl\">Комментарий<\u002Fdiv><span class=\"x\">${ICON('x')}<\u002Fspan><\u002Fdiv>\n      <div class=\"author\">${ph}<label class=\"fld\">${cap('Автор комментария')}<input value=\"Samanta R.\"><\u002Flabel><\u002Fdiv>\n      <div class=\"grid2\">\n        <div class=\"numfld\">${cap('Рейтинг')}<div class=\"numbox\"><button>−<\u002Fbutton><div class=\"val\">4<\u002Fdiv><button>+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"numfld\">${cap('Количество лайков')}<div class=\"numbox\"><button>−<\u002Fbutton><div class=\"val\">12<\u002Fdiv><button>+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <label class=\"fld stack\">${cap('Текст комментария')}<textarea rows=\"2\">This game is truly amazing! I recommend everyone to give it a try; it's worth it!<\u002Ftextarea><\u002Flabel>\n      <div class=\"cmt-actions\"><button>${ICON('reply')} Добавить ответ<\u002Fbutton><button>${ICON('sparkles')} Сгенерировать ответ<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cmt-bar\">\n      <span class=\"g\">${ICON('plus')} Добавить вручную<\u002Fspan>\n      <span class=\"g\">${ICON('sparkles')} Сгенерировать AI<\u002Fspan>\n      <span class=\"meta\">Создано <b>15 / 15<\u002Fb><\u002Fspan>\n      <button class=\"btn btn-acc\">Сохранить<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction rail(){\n  return `<div class=\"rail\">\n    <div class=\"phone\">\n      <div class=\"gp-top\">${ICON('chevron-left')} Google Play<\u002Fdiv>\n      <div class=\"gp-app\"><div class=\"gp-icon\">ICE<br>FISHING<\u002Fdiv>\n        <div><div class=\"gp-name\">Ice Fishing ${ICON('badge-check')}<\u002Fdiv><div class=\"gp-dev\">Evolution<\u002Fdiv><div class=\"gp-sub\">Contains ads · In-app purchases<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"gp-stats\">\n        <div class=\"sep\"><div class=\"v\">4.8 ${ICON('star')}<\u002Fdiv><div class=\"k\">1K reviews<\u002Fdiv><\u002Fdiv>\n        <div class=\"sep\"><div class=\"v\">10K+<\u002Fdiv><div class=\"k\">Downloads<\u002Fdiv><\u002Fdiv>\n        <div class=\"sep\"><div class=\"v\">${ICON('shield')}<\u002Fdiv><div class=\"k\">PEGI 16<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"v\">${ICON('download')}<\u002Fdiv><div class=\"k\">5.3 MB<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gp-install\">Install<\u002Fdiv>\n      <div class=\"gp-links\"><span>${ICON('share-2')} Share<\u002Fspan><span>${ICON('bookmark-plus')} Add to wishlist<\u002Fspan><\u002Fdiv>\n      <div class=\"gp-avail\">${ICON('monitor-smartphone')} This app is available for all of your devices<\u002Fdiv>\n      <div class=\"gp-shots\"><div class=\"s s1\"><\u002Fdiv><div class=\"s s2\"><\u002Fdiv><div class=\"s s3\"><\u002Fdiv><div class=\"s s4\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"gp-about\">About this app ${ICON('arrow-right')}<\u002Fdiv>\n      <div class=\"gp-desc\">🎣 ❄️ Ice Fishing – Drop the Line and Reel in Big Wins! 💎 Step onto the frozen lake and feel the chill of anticipation. Drill through the ice, cast your line, and wait for the perfect bite.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"store-toggle\"><button class=\"on\">Play Market<\u002Fbutton><button class=\"off\">App Store<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction editPage(){\n  return `<main class=\"main\">\n    <div class=\"topbar\"><h1>Редактирование приложения<\u002Fh1>\n      <div class=\"crumbs\">Приложения / <b>Редактирование приложения<\u002Fb><\u002Fdiv><\u002Fdiv>\n    ${stepper()}${langTabs()}\n    <div class=\"work\"><div class=\"col\">${formCard()}${commentsCard()}<\u002Fdiv>${rail()}<\u002Fdiv>\n  <\u002Fmain>`;\n}\n\n/* ---------- APPS LIST PAGE ---------- */\nconst ICOS={cr:['#e7b53b','#b4521a','CR2'],go:['#f2c33b','#7a3ad6','GoO'],pl:['#7b3fe4','#2b1466','PL'],\n  ice:['#2aa3e0','#0d4c8b','ICE'],tr:['#e07b2a','#7a2f0a','TR'],fr:['#2b9e5e','#0e4427','FR'],n:['#3a4a38','#1f261e','123']};\nfunction ico(k){const[c1,c2,t]=ICOS[k];return `<div class=\"app-ico\" style=\"background:linear-gradient(150deg,${c1},${c2})\">${t}<\u002Fdiv>`;}\nfunction geo(){return `<div class=\"geo\"><span class=\"fl uk\"><\u002Fspan><span class=\"fl ru\"><\u002Fspan><span class=\"plus\">+227<\u002Fspan><\u002Fdiv>`;}\nconst okB=`<span class=\"badge ok\">${ICON('check-circle-2')} Активен<\u002Fspan>`;\nconst noB=`<span class=\"badge no\">${ICON('info')} Не готов<\u002Fspan>`;\nfunction row(k,name,badge,date){\n  return `<div class=\"trow\">\n    <div class=\"app-name\">${ico(k)}<span>${name}<\u002Fspan><\u002Fdiv>\n    <div>${badge}<\u002Fdiv>${geo()}<div class=\"vert\">Гемблинг<\u002Fdiv>\n    <div class=\"date\">${ICON('calendar')} ${date}<\u002Fdiv>\n    <div class=\"dots\">${ICON('more-vertical')}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction table(rows){\n  return `<div class=\"tbl-card\">\n    <div class=\"thead\"><div>Название приложения<\u002Fdiv><div>Статус<\u002Fdiv><div>Гео<\u002Fdiv><div>Вертикаль<\u002Fdiv><div>Дата<\u002Fdiv><div><\u002Fdiv><\u002Fdiv>\n    ${rows}\n  <\u002Fdiv>`;\n}\nfunction appsPage(){\n  const templates=table(\n    row('cr','Chicken Road 2',okB,'1/21/2026, 03:42 PM')+\n    row('go','Gates of Olympus',okB,'1/21/2026, 03:25 PM')+\n    row('pl','Plinko',okB,'1/21/2026, 03:36 PM')+\n    row('ice','Ice Fishing',okB,'1/22/2026, 06:04 PM')+\n    row('tr','Tower Rush',okB,'1/22/2026, 05:56 PM'));\n  const yours=table(\n    row('ice','Ice Fishing Copy',okB,'2/13/2026, 08:31 PM')+\n    row('ice','123',noB,'3/17/2026, 08:02 PM')+\n    row('fr','FR Legends',noB,'4/13/2026, 12:50 PM')+\n    row('pl','Plinko Copy',noB,'5/8/2026, 03:20 PM'));\n  return `<main class=\"main\">\n    <div class=\"topbar\"><h1>Приложения ${ICON('info','class=\"i\"')}<\u002Fh1>\n      <div class=\"hactions\">\n        <button class=\"hbtn acc\">${ICON('layout-template')} Шаблоны<\u002Fbutton>\n        <button class=\"hbtn out\">${ICON('sliders-horizontal')} Фильтры<\u002Fbutton>\n        <button class=\"hbtn acc\">${ICON('plus')} Создать<\u002Fbutton>\n      <\u002Fdiv><\u002Fdiv>\n    <div class=\"search\">${ICON('search')}<input placeholder=\"Поиск по названию\"><\u002Fdiv>\n    <div class=\"sec\"><div class=\"sec-t\">Шаблоны приложений<\u002Fdiv>${templates}<\u002Fdiv>\n    <div class=\"sec\"><div class=\"sec-t\">Ваши приложения<\u002Fdiv>${yours}<\u002Fdiv>\n    <div class=\"pager\">Записей на странице: 100 ${ICON('chevron-down')} <span>1 / 1<\u002Fspan>\n      <div class=\"pg\"><button>${ICON('chevrons-left')}<\u002Fbutton><button>${ICON('chevron-left')}<\u002Fbutton><button>${ICON('chevron-right')}<\u002Fbutton><button>${ICON('chevrons-right')}<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>`;\n}\n\n/* ---------- JOURNEY / FUNNEL PAGE ---------- */\nfunction stepper5(){\n  const steps=[\n    {st:'Шаг 1 из 5',nm:'Воронка',ic:'play-circle',state:'now'},\n    {st:'Шаг 2 из 5',nm:'Преленд',ic:'puzzle',state:''},\n    {st:'Шаг 3 из 5',nm:'Дизайн',ic:'layers',state:''},\n    {st:'Шаг 4 из 5',nm:'Приложение',ic:'smartphone',state:''},\n    {st:'Шаг 5 из 5',nm:'Трафик',ic:'trending-up',state:''},\n  ];\n  return '<div class=\"stepper\">'+steps.map(s=>\n    `<div class=\"step ${s.state}\"><div class=\"ic\">${ICON(s.ic)}<\u002Fdiv><div><div class=\"st\">${s.st}<\u002Fdiv><div class=\"nm\">${s.nm}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`\n  ).join('')+'<\u002Fdiv>';\n}\nfunction journeyPage(){\n  const nodes=[\n    {n:1,state:'active',ic:'gamepad-2',lbl:'Прелендинг',badge:'off',bt:'Выключено'},\n    {n:2,state:'done',ic:'shopping-bag',lbl:'PlayMarket / App Store',badge:'on',bt:'Активно'},\n    {n:3,state:'done',ic:'download',lbl:'Установка PWA',badge:'on',bt:'Активно'},\n    {n:4,state:'done',ic:'external-link',lbl:'Открытие оффера',badge:'req',bt:'Обязательный'},\n  ];\n  const track=`<div class=\"jtrack\">\n    <div class=\"jline\"><div class=\"seg dash\"><\u002Fdiv><div class=\"seg solid\"><\u002Fdiv><\u002Fdiv>\n    ${nodes.map(o=>`<div class=\"jnode-wrap\">\n      <div class=\"jnode ${o.state}\">${o.n}<\u002Fdiv>\n      <div class=\"jbody\"><span class=\"jic\">${ICON(o.ic)}<\u002Fspan><div class=\"jlbl\">${o.lbl}<\u002Fdiv><span class=\"jbadge ${o.badge}\">${o.bt}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>`).join('')}\n  <\u002Fdiv>`;\n  const sw=(on)=>`<div class=\"switch ${on?'on':''}\"><\u002Fdiv>`;\n  const toggles=`<div class=\"toggles\">\n    <div class=\"trow\"><span class=\"tic\">${ICON('gamepad-2')}<\u002Fspan><div class=\"tx\"><div class=\"tnm\">Прелендинг<\u002Fdiv><\u002Fdiv>${sw(false)}<\u002Fdiv>\n    <div class=\"trow\"><span class=\"tic\">${ICON('download')}<\u002Fspan><div class=\"tx\"><div class=\"tnm\">Установка PWA<\u002Fdiv><\u002Fdiv>${sw(true)}<\u002Fdiv>\n    <div class=\"trow\"><span class=\"tic\">${ICON('shopping-bag')}<\u002Fspan><div class=\"tx\"><div class=\"tnm\">PlayMarket / App Store<\u002Fdiv><div class=\"tds\">PlayMarket / App Store может работать только с активной опцией Установка PWA<\u002Fdiv><\u002Fdiv>${sw(true)}<\u002Fdiv>\n  <\u002Fdiv>`;\n  return `<main class=\"main\">\n    <div class=\"topbar\"><h1>Редактирование приложения<\u002Fh1>\n      <div class=\"crumbs\">Приложения / <b>Редактирование приложения<\u002Fb><\u002Fdiv><\u002Fdiv>\n    ${stepper5()}\n    <div class=\"card\">\n      <div class=\"jtitle\">Пут   </script>
